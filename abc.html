<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
 * {
 margin: 0;
 padding: 0;
 box-sizing: border-box;
 }

 body {
 font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
 }

 .navbar {
 background-color: #333;
 overflow: hidden;
 position: sticky;
 top: 0;
 }

 .navbar a {
 float: left;
 display: block;
 color: white;
 text-align: center;
 padding: 14px 20px;
 text-decoration: none;
 transition: background-color 0.3s;
 }

 .navbar a:hover {
 background-color: #ddd;
 color: black;
 }

 .navbar a.active {
 background-color: #4CAF50;
 color: white;
 }

 .container {
 padding: 20px;
 max-width: 1200px;
 margin: 0 auto;
 }

 .section {
 margin: 40px 0;
 padding: 20px;
 background-color: #f9f9f9;
 border-radius: 8px;
 }

    
 .navbar a {
 float: none;
 display: block;
 text-align: left;
}
 </style>
</head>
<body>
      <div class="navbar">
          <a href="#home" class="active">Home</a>
           <a href="#about">About</a>
         <a href="#services">Services</a>
         <a href="#contact">Contact</a>
     </div>

            <div class="container">
                  <div id="home" class="section">
          <h2>Home Section</h2>
            <p>This is a responsive navigation bar with internal CSS.</p>
         </div>
    </div>
</body>

</html>
